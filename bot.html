<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Бот жалоб УК - Помощник по вопросам ЖКХ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Контейнер чата */
        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Шапка чата */
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .chat-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .status {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
            margin-left: 10px;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Область сообщений */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f7f7f7;
        }

        /* Стили сообщений */
        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Категории проблем (быстрые кнопки) */
        .categories {
            padding: 15px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .category-btn {
            background: #f0f0f0;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            color: #667eea;
            font-weight: 500;
        }

        .category-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        /* Поле ввода */
        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .chat-container {
                height: 95vh;
            }
            
            .message-content {
                max-width: 85%;
            }
            
            .category-btn {
                font-size: 11px;
                padding: 6px 12px;
            }
        }

        /* Скроллбар */
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>
                🏠 Помощник УК
                <span class="status"></span>
            </h1>
            <p>Обработка жалоб на домовое обслуживание</p>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-content">
                    👋 Здравствуйте! Я бот по приёму жалоб на управляющую компанию.<br><br>
                    📋 Я помогу вам:
                    <ul style="margin-top: 8px; margin-left: 20px;">
                        <li>Зафиксировать проблему</li>
                        <li>Создать заявку</li>
                        <li>Отследить статус обращения</li>
                    </ul>
                    <br>
                    💬 <strong>Опишите вашу проблему</strong> или выберите категорию ниже:
                </div>
            </div>
        </div>

        <div class="categories" id="categories">
            <button class="category-btn" data-category="отопление">🔥 Отопление</button>
            <button class="category-btn" data-category="вода">💧 Вода/Канализация</button>
            <button class="category-btn" data-category="электричество">⚡ Электричество</button>
            <button class="category-btn" data-category="мусор">🗑️ Мусор/Уборка</button>
            <button class="category-btn" data-category="лифт">🛗 Лифт</button>
            <button class="category-btn" data-category="кровля">🏠 Кровля/Фасад</button>
            <button class="category-btn" data-category="шум">🔊 Шум/Соседи</button>
            <button class="category-btn" data-category="другое">📝 Другое</button>
        </div>

        <div class="chat-input-container">
            <input type="text" class="chat-input" id="chatInput" placeholder="Введите вашу жалобу..." autocomplete="off">
            <button class="send-btn" id="sendBtn">📤 Отправить</button>
        </div>
    </div>

    <script>
        // Хранилище активных сессий
        let userSessions = {
            current: {
                step: 'initial',
                category: null,
                complaint: null,
                address: null,
                name: null,
                phone: null
            }
        };

        // Функция добавления сообщения
        function addMessage(text, isUser = false) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = text;
            
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            
            // Прокрутка вниз
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Функция имитации печати бота
        async function botTypingAndReply(text) {
            addMessage('🤔 <em>печатает...</em>', false);
            await new Promise(resolve => setTimeout(resolve, 800));
            
            // Удаляем последнее сообщение (печатает...)
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.removeChild(messagesDiv.lastChild);
            
            addMessage(text, false);
        }

        // Обработка ответов бота
        async function processUserMessage(message, session) {
            const lowerMsg = message.toLowerCase().trim();
            
            switch(session.step) {
                case 'initial':
                    // Определяем категорию из сообщения
                    let category = null;
                    const categories = {
                        'отопление': ['отоплени', 'батарея', 'холодно', 'тепло', 'радиатор', 'батареи'],
                        'вода': ['вода', 'канализаци', 'сантехник', 'течь', 'кран', 'унитаз', 'труб'],
                        'электричество': ['электричеств', 'свет', 'розетк', 'проводк', 'выбило', 'электроэнерги'],
                        'мусор': ['мусор', 'уборк', 'грязно', 'контейнер', 'вывоз', 'помойк'],
                        'лифт': ['лифт', 'подъемник', 'кабин'],
                        'кровля': ['крыш', 'кровл', 'потолок', 'течет', 'протек', 'фасад'],
                        'шум': ['шум', 'сосед', 'громко', 'музык', 'стук', 'ремонт'],
                        'другое': ['друг', 'прочее']
                    };
                    
                    for (let [cat, keywords] of Object.entries(categories)) {
                        if (keywords.some(keyword => lowerMsg.includes(keyword))) {
                            category = cat;
                            break;
                        }
                    }
                    
                    if (category) {
                        session.category = category;
                        session.step = 'complaint';
                        await botTypingAndReply(`📌 Понял! Вы выбрали категорию: <strong>${getCategoryName(category)}</strong>\n\n✍️ Пожалуйста, подробно опишите проблему:`);
                    } else {
                        await botTypingAndReply('📋 Пожалуйста, выберите категорию вашей проблемы из списка ниже или опишите её подробнее:');
                    }
                    break;
                    
                case 'complaint':
                    session.complaint = message;
                    session.step = 'address';
                    await botTypingAndReply('🏠 Укажите ваш полный адрес (улица, дом, квартира):');
                    break;
                    
                case 'address':
                    session.address = message;
                    session.step = 'name';
                    await botTypingAndReply('👤 Ваше имя (для связи):');
                    break;
                    
                case 'name':
                    session.name = message;
                    session.step = 'phone';
                    await botTypingAndReply('📞 Ваш контактный телефон:');
                    break;
                    
                case 'phone':
                    session.phone = message;
                    // Сохраняем жалобу
                    saveComplaint(session);
                    await botTypingAndReply(`✅ <strong>Жалоба принята!</strong>\n\n📋 <strong>Детали обращения:</strong>\n• Категория: ${getCategoryName(session.category)}\n• Адрес: ${session.address}\n• Заявитель: ${session.name}\n\n🆔 Номер заявки: <strong>${generateTicketNumber()}</strong>\n\n⏱️ Статус: Принято в обработку\n\n👨‍💼 С вами свяжутся в течение 24 часов.\n\n💡 Что-то ещё? Напишите "новая" чтобы создать новое обращение или "статус" чтобы проверить статус.`);
                    
                    // Сброс сессии
                    session.step = 'initial';
                    session.category = null;
                    session.complaint = null;
                    session.address = null;
                    session.name = null;
                    session.phone = null;
                    break;
                    
                default:
                    if (lowerMsg.includes('новая') || lowerMsg.includes('новое обращение')) {
                        session.step = 'initial';
                        session.category = null;
                        session.complaint = null;
                        session.address = null;
                        session.name = null;
                        session.phone = null;
                        await botTypingAndReply('🔄 Начинаем новое обращение.\n\n📋 Опишите вашу проблему или выберите категорию:');
                    } else if (lowerMsg.includes('статус')) {
                        await botTypingAndReply('📊 Для проверки статуса, пожалуйста, введите номер заявки, который вы получили при создании обращения.\n\n(Если вы только что создали обращение, статус можно проверить через 15-30 минут)');
                    } else {
                        await botTypingAndReply('🤔 Извините, я вас не понял.\n\nДоступные команды:\n• "новая" - создать новое обращение\n• "статус" - проверить статус заявки\n\nИли просто опишите вашу проблему!');
                    }
            }
        }

        // Сохранение жалобы (имитация отправки на сервер)
        function saveComplaint(session) {
            const complaint = {
                id: generateTicketNumber(),
                timestamp: new Date().toISOString(),
                category: session.category,
                complaint: session.complaint,
                address: session.address,
                name: session.name,
                phone: session.phone,
                status: 'Принято'
            };
            
            // Сохраняем в localStorage
            let complaints = JSON.parse(localStorage.getItem('complaints') || '[]');
            complaints.push(complaint);
            localStorage.setItem('complaints', JSON.stringify(complaints));
            
            console.log('Жалоба сохранена:', complaint);
        }

        // Генерация номера заявки
        function generateTicketNumber() {
            return 'UK-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
        }

        // Получение названия категории
        function getCategoryName(category) {
            const names = {
                'отопление': '🔥 Отопление',
                'вода': '💧 Вода/Канализация',
                'электричество': '⚡ Электричество',
                'мусор': '🗑️ Мусор/Уборка',
                'лифт': '🛗 Лифт',
                'кровля': '🏠 Кровля/Фасад',
                'шум': '🔊 Шум/Соседи',
                'другое': '📝 Другое'
            };
            return names[category] || category;
        }

        // Обработка отправки сообщения
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Добавляем сообщение пользователя
            addMessage(message, true);
            input.value = '';
            
            // Обрабатываем ответ бота
            await processUserMessage(message, userSessions.current);
        }

        // Обработка нажатия на категорию
        async function handleCategoryClick(category) {
            const session = userSessions.current;
            
            if (session.step === 'initial') {
                session.category = category;
                session.step = 'complaint';
                addMessage(getCategoryName(category), true);
                await botTypingAndReply(`📌 Вы выбрали категорию: <strong>${getCategoryName(category)}</strong>\n\n✍️ Пожалуйста, подробно опишите проблему:`);
            } else {
                await botTypingAndReply('⏳ Пожалуйста, сначала завершите текущее обращение или напишите "новая" для создания нового.');
            }
        }

        // Инициализация событий
        document.addEventListener('DOMContentLoaded', () => {
            const sendBtn = document.getElementById('sendBtn');
            const chatInput = document.getElementById('chatInput');
            
            sendBtn.addEventListener('click', sendMessage);
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
            
            // Добавляем обработчики для кнопок категорий
            const categoryBtns = document.querySelectorAll('.category-btn');
            categoryBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const category = btn.getAttribute('data-category');
                    handleCategoryClick(category);
                });
            });
        });
    </script>
</body>
</html>
